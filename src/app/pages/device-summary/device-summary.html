<div style="width: 80%; margin: 2vh auto;">
    <app-device-fields-form [title]="'Device Details'" [model]="newDevice()" [metadata]="deviceMetadata()"
        [submitLabel]="'Update Device'" [showDeleteButton]="true" (modelChange)="onDeviceChange($event)"
        (submitForm)="updateDevice()" (deleteForm)="deleteDevice()" />
 
    <app-shelf-positions-table [shelfPositions]="shelfPositions()" [interactive]="true"
        (attachShelfRequested)="attachShelf($event)" (detachShelfRequested)="detachShelf($event)"
        (deleteShelfRequested)="deleteShelf($event)" />
 
    <div style="text-align: center; margin-top: 2vh;">
        <button type="button" (click)="addShelfPosition()">Add Shelf Position</button>
    </div>
</div>
