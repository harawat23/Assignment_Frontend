<div style="display: flex; justify-content: space-between; align-items: center;">
    <h1 style="text-align: center;">Shelf Summary</h1>
</div>
 
<div style="width: 80%; margin: 2vh auto;">
    <app-shelf-fields-form [title]="'Shelf Details'" [model]="editShelf()" [metadata]="shelfMetadata()"
        [submitLabel]="'Update Shelf'" [showDeleteButton]="true" (modelChange)="onShelfChange($event)"
        (submitForm)="updateShelf()" (deleteform)="deleteShelf()" />
</div>
