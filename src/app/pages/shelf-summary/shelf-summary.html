<div style="display: flex; justify-content: space-between; align-items: center;">
    <h1 style="text-align: center;">Shelf Summary</h1>
</div>

<div class="card" style="width: 80%; margin: 2vh auto; padding: 2vh; box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);">
    <h2 style="text-align: center;">Shelf Details</h2>
    <div class="table-responsive">
        <table class="table">
            <tr>
                <td>
                    <div class="form-group mb-3">
                        <label for="shelfIdInput">Shelf Id</label>
                        <input type="text" id="shelfIdInput" class="form-control" placeholder="Enter Shelf Id"
                            [value]="this.shelfData()?.shelfId" readonly>
                    </div>
                    <div class="form-group mb-3">
                        <label for="shelfNameInput" class="form-label">Shelf Name</label>
                        <input type="text" id="shelfNameInput" class="form-control" placeholder="Enter Shelf Name"
                            [value]="this.newShelf().shelfName"
                            (input)="this.newShelf().shelfName=$event.target.value" />
                    </div>
                    <div class="form-group mb-3">
                        <label for="shelfPartNumberInput" class="form-label">Part Number</label>
                        <input type="text" id="shelfPartNumberInput" class="form-control"
                            placeholder="Enter Device Type" [value]="this.newShelf().partNumber"
                            (input)="this.newShelf().partNumber=$event.target.value" />
                    </div>
                    <div class="form-group mb-3">
                        <label for="shelfIdInput">Created At</label>
                        <input type="text" id="shelfIdInput" class="form-control" placeholder="Enter Shelf Id"
                            [value]="this.shelfData()?.createdAt" readonly>
                    </div>
                    <div class="form-group mb-3">
                        <label for="shelfIdInput">Updated At</label>
                        <input type="text" id="shelfIdInput" class="form-control" placeholder="Enter Shelf Id"
                            [value]="this.shelfData()?.updatedAt" readonly>
                    </div>
                </td>
            </tr>
        </table>
        <button (click)="updateShelf()">Update Shelf</button>
        <button (click)="deleteShelf(shelfData()?.shelfId)">Delete Shelf</button>
    </div>
</div>
